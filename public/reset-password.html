<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory-OS — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0A0A0A; --surface: #111111; --surface-2: #181818; --surface-3: #1F1F1F;
            --border: #222222; --border-light: #2e2e2e; --text: #FFFFFF;
            --text-secondary: #A1A1AA; --text-muted: #52525B;
            --primary: #00AE68; --primary-dim: #00875A;
            --primary-glow: rgba(0,174,104,0.1); --primary-border: rgba(0,174,104,0.25);
            --danger: #ef4444;
        }
        html, body { min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px; pointer-events: none; z-index: 0;
        }
        nav { height: 56px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border); background: rgba(17,17,17,0.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10; }
        .logo { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); text-decoration: none; letter-spacing: -0.3px; }
        .logo span { color: var(--primary); }
        .page { position: relative; z-index: 1; min-height: calc(100vh - 56px); display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border-light); border-radius: 16px; padding: 36px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
        .card-header { text-align: center; margin-bottom: 28px; }
        .card-logo { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
        .card-logo span { color: var(--primary); }
        h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.3px; }
        .form-input { width: 100%; height: 42px; padding: 0 14px; background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .form-input:focus { border-color: var(--primary); }
        .form-input::placeholder { color: var(--text-muted); }
        .btn-submit { width: 100%; height: 44px; background: var(--primary); border: none; border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
        .btn-submit:hover { background: var(--primary-dim); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .message.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .message.success { background: var(--primary-glow); border: 1px solid var(--primary-border); color: #6ee7b7; }
        .message.visible { display: block; }
        .back-link { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); }
        .back-link a { color: var(--primary); text-decoration: none; }
        .invalid-state { text-align: center; padding: 20px 0; }
        .invalid-state p { color: var(--text-secondary); font-size: 14px; margin-bottom: 16px; }
        .invalid-state a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="logo">Factory<span>OS</span></a>
</nav>

<div class="page">
    <div class="card">
        <div class="card-header">
            <div class="card-logo">Factory<span>OS</span></div>
        </div>

        <div id="resetForm">
            <h3>Choose a new password</h3>
            <p class="subtitle">Enter a new password for your account.</p>

            <div id="msgReset" class="message"></div>

            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" autocomplete="new-password">
            </div>
            <button class="btn-submit" id="btnReset" onclick="doReset()">Set New Password</button>
        </div>

        <div id="invalidState" class="invalid-state" style="display:none">
            <p>This reset link is invalid or has expired.</p>
            <a href="/login">Request a new one →</a>
        </div>

        <div class="back-link">
            <a href="/login">← Back to sign in</a>
        </div>
    </div>
</div>

<script>
    var token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('invalidState').style.display = 'block';
    } else {
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('newPassword').focus();
        });
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doReset();
    });

    function showMsg(type, text) {
        var el = document.getElementById('msgReset');
        el.className = 'message ' + type + ' visible';
        el.textContent = text;
    }

    async function doReset() {
        var password = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;

        if (!password) return showMsg('error', 'Please enter a new password.');
        if (password.length < 8) return showMsg('error', 'Password must be at least 8 characters.');
        if (password !== confirm) return showMsg('error', 'Passwords do not match.');

        var btn = document.getElementById('btnReset');
        btn.disabled = true;
        btn.textContent = 'Saving…';

        try {
            var res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            var data = await res.json();
            if (!res.ok) {
                if (res.status === 400) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('invalidState').style.display = 'block';
                    return;
                }
                throw new Error(data.message || 'Reset failed');
            }

            // Auto-login with new token
            localStorage.setItem('fos_token', data.token);
            localStorage.setItem('fos_user', JSON.stringify(data.user));

            showMsg('success', 'Password changed! Redirecting…');
            setTimeout(function() { window.location.href = '/projects'; }, 1200);
        } catch(e) {
            showMsg('error', e.message);
            btn.disabled = false;
            btn.textContent = 'Set New Password';
        }
    }
</script>
</body>
</html>
