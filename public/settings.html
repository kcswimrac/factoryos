<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Factory-OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:             #0A0A0A;
      --surface:        #111111;
      --surface-2:      #181818;
      --border:         #1e1e1e;
      --border-light:   #2e2e2e;
      --primary:        #00AE68;
      --primary-hover:  #00c977;
      --primary-glow:   rgba(0,174,104,0.10);
      --primary-border: rgba(0,174,104,0.25);
      --text:           #F4F4F5;
      --text-secondary: #A1A1AA;
      --text-muted:     #52525B;
      --danger:         #ef4444;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    /* ── NAV ── */
    .topnav {
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo { font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; }
    .logo span { color: var(--primary); }
    .topnav-right { display: flex; gap: 10px; align-items: center; }
    .nav-back {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--text-secondary); font-size: 13px; text-decoration: none;
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-light);
      transition: all 0.15s;
    }
    .nav-back:hover { color: var(--text); border-color: #3f3f46; }

    /* ── LAYOUT ── */
    .page { max-width: 640px; margin: 40px auto; padding: 0 24px 60px; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .card-icon { font-size: 16px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; height: 40px; padding: 0 12px;
      background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 8px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── BUTTONS ── */
    .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
    .btn-primary {
      height: 38px; padding: 0 18px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MESSAGES ── */
    .msg {
      padding: 11px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .msg.error  { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; display: block; }
    .msg.success { background: var(--primary-glow); border: 1px solid var(--primary-border); color: #6ee7b7; display: block; }

    /* ── USER INFO ── */
    .user-meta { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .user-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }

    /* ── DANGER ZONE ── */
    .danger-card {
      background: rgba(239,68,68,0.04);
      border: 1px solid rgba(239,68,68,0.15);
    }
    .danger-card .card-title { color: #fca5a5; border-bottom-color: rgba(239,68,68,0.15); }
    .danger-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
    .btn-danger {
      height: 38px; padding: 0 18px;
      background: transparent; color: var(--danger);
      border: 1px solid rgba(239,68,68,0.35); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.08); border-color: var(--danger); }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="/projects" class="logo">Factory<span>-OS</span></a>
  <div class="topnav-right">
    <a href="/projects" class="nav-back">← Projects</a>
  </div>
</nav>

<div class="page">

  <div class="card">
    <div class="card-title"><span class="card-icon">👤</span> Profile</div>
    <div id="profileInfo" style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
      <div class="user-name" id="displayName">—</div>
      <div class="user-meta" id="displayEmail">—</div>
    </div>
    <div id="profileMsg" class="msg"></div>
    <form onsubmit="saveProfile(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" id="inputName" class="form-input" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="inputEmail" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary" id="btnSaveProfile">Save Changes</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-icon">🔒</span> Change Password</div>
    <div id="passwordMsg" class="msg"></div>
    <form onsubmit="changePassword(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" id="inputCurrentPw" class="form-input" placeholder="Enter current password" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="inputNewPw" class="form-input" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" id="inputConfirmPw" class="form-input" placeholder="Repeat new password" autocomplete="new-password">
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary" id="btnChangePw">Change Password</button>
      </div>
    </form>
  </div>

  <div class="card danger-card">
    <div class="card-title"><span class="card-icon">⚠️</span> Sign Out</div>
    <div class="danger-desc">Sign out of your account on this device.</div>
    <button class="btn-danger" onclick="signOut()">Sign Out</button>
  </div>

</div>

<script>
  var token = localStorage.getItem('fos_token');
  var user  = null;

  if (!token) { location.href = '/login?next=/settings'; throw 0; }

  // ── Load user ───────────────────────────────────────────────────────────────
  async function loadUser() {
    try {
      var res  = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      var data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed to load profile');
      user = data.user;
      document.getElementById('displayName').textContent  = user.name  || '—';
      document.getElementById('displayEmail').textContent = user.email || '—';
      document.getElementById('inputName').value  = user.name  || '';
      document.getElementById('inputEmail').value = user.email || '';
    } catch(e) {
      showMsg('profileMsg', 'error', e.message);
    }
  }

  // ── Save profile ────────────────────────────────────────────────────────────
  async function saveProfile(e) {
    e.preventDefault();
    var name  = document.getElementById('inputName').value.trim();
    var email = document.getElementById('inputEmail').value.trim();
    var btn   = document.getElementById('btnSaveProfile');
    btn.disabled = true; btn.textContent = 'Saving…';
    clearMsg('profileMsg');
    try {
      var res  = await fetch('/api/auth/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ name, email })
      });
      var data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Save failed');
      user = data.user;
      document.getElementById('displayName').textContent  = user.name;
      document.getElementById('displayEmail').textContent = user.email;
      // Update stored user
      localStorage.setItem('fos_user', JSON.stringify(user));
      showMsg('profileMsg', 'success', '✓ Profile updated');
    } catch(e) {
      showMsg('profileMsg', 'error', e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  }

  // ── Change password ─────────────────────────────────────────────────────────
  async function changePassword(e) {
    e.preventDefault();
    var currentPw = document.getElementById('inputCurrentPw').value;
    var newPw     = document.getElementById('inputNewPw').value;
    var confirmPw = document.getElementById('inputConfirmPw').value;
    clearMsg('passwordMsg');
    if (!currentPw || !newPw || !confirmPw) {
      return showMsg('passwordMsg', 'error', 'All fields are required');
    }
    if (newPw !== confirmPw) {
      return showMsg('passwordMsg', 'error', 'New passwords do not match');
    }
    if (newPw.length < 8) {
      return showMsg('passwordMsg', 'error', 'New password must be at least 8 characters');
    }
    var btn = document.getElementById('btnChangePw');
    btn.disabled = true; btn.textContent = 'Updating…';
    try {
      var res  = await fetch('/api/auth/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ currentPassword: currentPw, newPassword: newPw })
      });
      var data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Password change failed');
      document.getElementById('inputCurrentPw').value = '';
      document.getElementById('inputNewPw').value = '';
      document.getElementById('inputConfirmPw').value = '';
      showMsg('passwordMsg', 'success', '✓ Password changed successfully');
    } catch(e) {
      showMsg('passwordMsg', 'error', e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Change Password';
    }
  }

  // ── Sign out ────────────────────────────────────────────────────────────────
  function signOut() {
    if (!confirm('Sign out of your account?')) return;
    localStorage.removeItem('fos_token');
    localStorage.removeItem('fos_user');
    location.href = '/login';
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function showMsg(id, type, text) {
    var el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    // Auto-clear success messages
    if (type === 'success') setTimeout(function() { clearMsg(id); }, 4000);
  }
  function clearMsg(id) {
    var el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  loadUser();
</script>
</body>
</html>
